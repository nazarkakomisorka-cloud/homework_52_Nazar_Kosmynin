{% extends 'webapp/base.html' %}

{% block content %}
<h1 class="mb-4">{{ task.description }}</h1>

<div class="card bg-white">
    <div class="card-body">
        <p><strong>Статус:</strong> {{ task.get_status_display }}</p>
        <p><strong>Дата выполнения:</strong> {{ task.due_date|default:"—" }}</p>
        <p><strong>Подробное описание:</strong></p>
        <p style="white-space: pre-wrap;">{{ task.details|default:"—" }}</p>
    </div>
</div>

<a href="{% url 'task_list' %}" class="btn btn-secondary mt-3">← Назад</a>
<a href="{% url 'task_delete' task.id %}" class="btn btn-danger mt-3">Удалить</a>
{% endblock %}
