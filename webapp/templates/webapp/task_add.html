{% extends 'webapp/base.html' %}

{% block content %}
<h1 class="mb-4">Новая задача</h1>
<div style="max-width: 500px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Описание</label>
            <input type="text" name="description" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Подробное описание</label>
            <textarea name="details" class="form-control" rows="4"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Статус</label>
            <select name="status" class="form-select">
                {% for value, label in status_choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Дата выполнения (YYYY-MM-DD)</label>
            <input type="text" name="due_date" class="form-control" placeholder="2025-12-31">
        </div>
        <button type="submit" class="btn btn-success">Сохранить</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
